[tips-and-tricks-item-description]
5dim-enemies-intro=5Dim's Enemies adds a complete overhaul of the enemy system with specialized enemy types, a 10-tier progression system, and boss enemies.\n\nEach enemy type has unique characteristics, resistances, and behaviors that require different strategies to defeat. Learn about each type to prepare your defenses accordingly.

5dim-enemies-tiers=Enemies in 5Dim's now spawn in 10 tiers (T1-T10) plus powerful boss variants.\n\n[font=default-bold]Tier Progression:[/font]\n• Tiers scale with evolution factor\n• Higher tiers have more health, damage, and resistances\n• 3 tiers are active at any evolution level\n• Each type has different evolution ranges\n\n[font=default-bold]Boss Enemies:[/font]\n• Appear at high evolution (90%+)\n• 3x health and damage multiplier\n• 2x scale (visually larger)\n• Slower but much more dangerous

5dim-enemies-full-battle=Watch all enemy types working together in a combined assault against a fortified defense!\n\n[font=default-bold]Enemies in this battle:[/font]\n• Normal, Laser, Physical, Impact Biters\n• Broodmother (spawns children on death)\n• Swarm Biters (many small fast enemies)\n• Regenerator and Berserker Biters\n• Fire, Rocket, Poison, Electric Spitters\n\n[font=default-bold]Defense setup:[/font]\n• Gun turrets (front line)\n• Laser turrets (high damage)\n• Flamethrower turret (area damage)\n• Stone walls (protection)

5dim-enemies-normal-biter=Standard biters similar to vanilla enemies.\n\n[font=default-bold]Characteristics:[/font]\n• No special resistances\n• Balanced stats across all tiers\n• Spawn from evolution 0% to 80%\n\n[font=default-bold]Strategy:[/font]\nAny weapon type is effective. Good for testing defensive setups.

5dim-enemies-laser-biter=[color=#4444FF]Blue-colored biters[/color] with high laser resistance.\n\n[font=default-bold]Characteristics:[/font]\n• 85%+ laser damage resistance\n• Normal physical vulnerability\n• Spawn from evolution 10% to 100%\n\n[font=default-bold]Strategy:[/font]\nUse gun turrets, flamethrowers, or artillery. Laser turrets are nearly useless against them.

5dim-enemies-physical-biter=[color=#AAAAAA]Gray/silver armored biters[/color] with high bullet resistance.\n\n[font=default-bold]Characteristics:[/font]\n• 85%+ physical damage resistance\n• High damage reduction (decreases damage flat)\n• Spawn from evolution 10% to 100%\n\n[font=default-bold]Strategy:[/font]\nUse laser turrets, flamethrowers, or explosives. Gun turrets do minimal damage.

5dim-enemies-impact-biter=[color=#8B4513]Dark brown heavy biters[/color] that deal impact damage.\n\n[font=default-bold]Characteristics:[/font]\n• 30% more health than normal\n• 50% more damage\n• 15% slower movement\n• Resistant to impact damage\n• Spawn from evolution 10% to 100%\n\n[font=default-bold]Strategy:[/font]\nThey're slower, so kiting is effective. Use long-range weapons to thin their numbers before they reach your walls.

5dim-enemies-broodmother-biter=[color=#FF00FF]Magenta/pink biters[/color] that spawn offspring when killed.\n\n[font=default-bold]Characteristics:[/font]\n• 50% more health (tanky)\n• 30% slower movement\n• 20% less damage\n• [color=red]On death: 50% chance to spawn a lower-tier biter[/color]\n• Spawn from evolution 25% to 100%\n\n[font=default-bold]Strategy:[/font]\nUse high-damage weapons to one-shot them when possible. Area-of-effect weapons can handle the spawned offspring. Flamethrowers are excellent as they damage both the broodmother and its spawn.

5dim-enemies-swarm-biter=[color=#FFD700]Small golden/tan biters[/color] that attack in large numbers.\n\n[font=default-bold]Characteristics:[/font]\n• 75% less health (very fragile)\n• 50% less damage\n• 50% faster movement\n• 70% normal scale (smaller)\n• [color=cyan]Spawners produce 2x units at 2x speed[/color]\n• Spawn from evolution 10% to 100%\n\n[font=default-bold]Strategy:[/font]\nArea-of-effect weapons shine here. Flamethrowers, rockets, and grenades can wipe out entire swarms. Single-target weapons will be overwhelmed.

5dim-enemies-regenerator-biter=[color=#00FF00]Bright lime green biters[/color] that heal extremely fast.\n\n[font=default-bold]Characteristics:[/font]\n• 25% less health\n• [color=cyan]5x faster healing rate[/color]\n• [color=red]Weak to fire (-25% resistance)[/color]\n• Spawn from evolution 20% to 100%\n\n[font=default-bold]Strategy:[/font]\nFocus fire to kill them quickly, or use fire damage to exploit their weakness. If you let them retreat, they'll return at full health almost instantly.

5dim-enemies-berserker-biter=[color=#CC0000]Blood red biters[/color] that are glass cannons.\n\n[font=default-bold]Characteristics:[/font]\n• 50% less health\n• [color=red]2x damage (very dangerous!)[/color]\n• 30% faster movement\n• [color=cyan]Cannot heal at all[/color]\n• Takes 10% extra physical damage\n• Spawn from evolution 25% to 100%\n\n[font=default-bold]Strategy:[/font]\nKill them before they reach your walls! High burst damage is essential. They deal devastating damage but die quickly. Walls are crucial to slow them down.

5dim-enemies-tank=[color=#808000]Military olive green enemies[/color] that resist all damage types equally.\n\n[font=default-bold]Available:[/font]\n• Tank Biters\n• Tank Spitters\n• Tank Worms\n\n[font=default-bold]Characteristics:[/font]\n• [color=cyan]50% resistance to ALL damage types[/color] (physical, laser, fire, poison, electric, explosion, acid, impact)\n• [color=cyan]2x health[/color] (extremely tanky)\n• [color=red]65% less damage[/color]\n• 20% slower movement\n• No flat damage reduction, only percentage\n• Spawn from evolution 15% to 100%\n\n[font=default-bold]Strategy:[/font]\nNo single weapon type is particularly effective or weak against them. Use your highest DPS weapons. Their low damage means they're not immediately threatening, but they can distract your defenses while more dangerous enemies approach.

5dim-enemies-fire-spitter=[color=#FF6600]Orange/fire spitters[/color] that shoot fire projectiles.\n\n[font=default-bold]Characteristics:[/font]\n• 25% less health than normal spitters\n• Fire damage over time on impact\n• Creates burning ground\n• Spawn from evolution 20% to 100%\n\n[font=default-bold]Strategy:[/font]\nTheir projectiles can set your base on fire. Use stone or concrete paths around turrets. Fire-resistant equipment helps for personal defense.

5dim-enemies-rocket-spitter=[color=#FFFF66]Pale yellow spitters[/color] that shoot explosive rockets.\n\n[font=default-bold]Characteristics:[/font]\n• 25% less health than normal spitters\n• Explosive splash damage\n• Area damage on impact\n• Spawn from evolution 30% to 100%\n\n[font=default-bold]Strategy:[/font]\nSpread out your defenses to minimize splash damage. Walls help absorb rocket hits. Priority targets for sniping.

5dim-enemies-suicide-spitter=[color=#9900CC]Dark purple spitters[/color] that explode on death.\n\n[font=default-bold]Characteristics:[/font]\n• 50% less health\n• 50% faster movement\n• [color=red]5x damage on explosion![/color]\n• Spawn from evolution 30% to 100%\n\n[font=default-bold]Strategy:[/font]\nKill them at range before they reach your base. Their explosions can destroy turrets and walls. Never let them get close to critical infrastructure.

5dim-enemies-poison-spitter=[color=#006600]Dark green spitters[/color] that apply poison damage.\n\n[font=default-bold]Characteristics:[/font]\n• Poison damage over time\n• Stacking poison effect\n• Spawn from evolution 20% to 100%\n\n[font=default-bold]Strategy:[/font]\nPoison can wear down your structures over time. Repair packs and robots are essential. Personal shields help against poison damage.

5dim-enemies-electric-spitter=[color=#00FFFF]Bright cyan spitters[/color] that deal chain lightning damage.\n\n[font=default-bold]Characteristics:[/font]\n• Electric/lightning damage\n• Can jump between nearby targets\n• Spawn from evolution 30% to 100%\n\n[font=default-bold]Strategy:[/font]\nSpace out your turrets to prevent chain damage. Isolated defensive positions are more effective than dense clusters.

5dim-enemies-railgun=[color=#008080]Teal enemies[/color] from Space Age with railgun resistance.\n\n[font=default-bold]Available:[/font]\n• Railgun Biters\n• Railgun Spitters\n• Railgun Worms\n\n[font=default-bold]Characteristics:[/font]\n• High resistance to railgun/armor-piercing damage\n• Spawn from evolution 20% to 100%\n\n[font=default-bold]Strategy:[/font]\nUse conventional weapons. Railguns and armor-piercing rounds are less effective.

5dim-enemies-bosses=[color=#6600CC]Boss enemies[/color] are massive, powerful variants of each enemy type.\n\n[font=default-bold]Boss Multipliers:[/font]\n• 3x Health\n• 3x Damage\n• 2x Scale (visually larger)\n• 40% slower movement\n\n[font=default-bold]Spawn Conditions:[/font]\n• Begin appearing at 90% evolution\n• Maximum spawn rate at 100% evolution\n• All enemy types have boss variants\n\n[font=default-bold]Strategy:[/font]\nBosses require concentrated firepower. Artillery, rockets, and focused turret fire are essential. They're slow, use that to your advantage!

[tips-and-tricks-item-category-name]
5dim=5Dim's Mod