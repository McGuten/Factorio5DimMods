[technology-description]
5d-vulcanus-resources=Unlocks tungsten dust, calcite dust, and catalyzed lava processing.
5d-fulgora-resources=Unlocks holmium dust, compacted scrap, and scrap recycling.
5d-gleba-resources=Unlocks concentrated yumako and jellynut processing.
5d-aquilo-resources=Unlocks enhanced ammoniacal solution separation and lithium processing.
5d-orbit-resources=Unlocks asteroid mashing into dust and the basic orbital crushing recipes that consume that dust.
5d-advanced-orbit-resources=Unlocks advanced orbital crushing recipes that consume asteroid dust with a higher processing cost.

