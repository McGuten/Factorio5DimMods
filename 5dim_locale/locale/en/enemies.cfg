[mod-setting-description]
5d-laser-biter=Enable biters resistant to laser damage
5d-physical-biter=Enable biters resistant to physical damage
5d-impact-biter=Enable biters resistant to impact/explosion damage
5d-railgun-biter=Enable biters resistant to physical damage with railgun attacks (requires Space Age)
5d-fire-spitter=Enable spitters that shoot fire streams
5d-rocket-spitter=Enable spitters that shoot rockets
5d-suicide=Enable spitters that explode on contact
5d-laser-spitter=Enable spitters that shoot laser beams
5d-physical-spitter=Enable spitters that throw rocks/debris
5d-poison-spitter=Enable spitters that create poison clouds
5d-electric-spitter=Enable spitters with electric discharge attacks
5d-broodmother-biter=Enable biters that spawn offspring when they die
5d-broodmother-spitter=Enable spitters that spawn offspring when they die
5d-swarm-biter=Enable tiny, fast biters that attack in large numbers
5d-regenerator-biter=Enable biters that regenerate health extremely fast
5d-regenerator-spitter=Enable spitters that regenerate health extremely fast
5d-berserker-biter=Enable aggressive biters with high damage but low health
5d-tank-biter=Enable extremely tanky biters with 50% resistance to all damage types but low damage
5d-tank-spitter=Enable extremely tanky spitters with 50% resistance to all damage types but low damage
5d-tank-worm=Enable extremely tanky worms with 50% resistance to all damage types but low damage
5d-railgun-spitter=Enable spitters that shoot railgun beams (requires Space Age)
5d-worm=Enable Behemoth and Boss tier worms
5d-railgun-worm=Enable worms that shoot railgun beams (requires Space Age)
5d-boss=Enable Boss (tier 11) enemies that appear at very high evolution
5d-death-effects=Enable special death effects for elemental enemies (fire, poison, electric, etc.)
5d-death-effect-scale=Scale of death effects (0.25 = smaller, 3.0 = much larger)
5d-typed-damage=Enable typed damage for enemy attacks (fire biters deal fire damage, etc.)
5d-attack-stickers=Enable stickers on enemy attacks (fire causes burning, poison causes slowdown)
5d-health-multiplier=Multiplier for enemy health (higher = tougher enemies)
5d-damage-multiplier=Multiplier for enemy damage (higher = more dangerous attacks)
5d-speed-multiplier=Multiplier for enemy movement speed (higher = faster enemies)

