[mod-setting-description]
5d-space-age-materials=When enabled and Space Age DLC is installed, high-tier items (5-10) will require materials from different planets: Vulcanus (tungsten), Fulgora (holmium, supercapacitors), and Aquilo (superconductors, quantum processors).
5d-space-age-science-packs=When enabled and Space Age DLC is installed, high-tier technologies (5-10) will require planetary science packs: Metallurgic (tiers 5-6), Electromagnetic (tiers 7-8), and Cryogenic (tiers 9-10).
5d-tech-cost-multiplier=Multiplier for all technology research costs (Default: 1.0)
5d-recipe-cost-multiplier=Multiplier for all recipe ingredient quantities (Default: 1.0)
5d-crafting-time-multiplier=Multiplier for all crafting times (Default: 1.0)
5d-change-inventory=Number of inventory slots for the player (Default: 60)
5d-change-stack=Multiplier for item stack sizes
5d-long-reach=Distance for building and opening inventories. For interaction with entire screen: 125 (Default: 6)
5d-long-mine=Extend the mining distance of your player (Default: 6)
5d-mining-speed=Multiplier for player mining speed
5d-light-radius=Radius of the light around the player (Default: 25)
5d-ores=Make all resource deposits infinite
5d-yield=Infinite ores with full yield (100% minimum)
5d-tree=Reduce tree collision box for easier navigation
5d-item-start=Select starting items when creating a new map
5d-equip-start=Select starting equipment when creating a new map
5d-train-tech=Unlock train technologies at game start
5d-robot-tech=Unlock robot technologies at game start
5d-hp=Maximum health points for the player (Default: 250)
5d-healing=Health regeneration per tick (Default: 0.15)
5d-stack-artillery-bullets=Allow artillery shells to stack up to 5
5d-bicho-spawner-hp=Multiplier for enemy spawner health
5d-bicho-hp=Multiplier for enemy unit health
5d-bicho-healing=Multiplier for enemy healing per tick
5d-suicide=Enable suicide biters that explode on contact
5d-exp=Enable experimental enemy types
5d-worm=Enable behemoth and experimental worms
5d-storage=Enable infinite research for robot cargo size
5d-stack=Enable infinite research for stack inserter capacity
5d-speed=Enable infinite research for research speed bonus
5d-speed-gun-turret=Enable infinite research for gun and turret speed
5d-braking=Enable infinite research for train braking force
5d-grid=Enable equipment grids on vehicles
5d-grid-override=Override equipment grids on all vehicles (requires vehicle grids enabled)